<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Now | ADetailing</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Book Your Detail</h1>
    <p>Reserve your appointment with ADetailing</p>
</header>

<section>

<h2>Request an Appointment</h2>

<form action="https://formspree.io/f/YOURFORMID" method="POST">

<label>Full Name</label><br>
<input type="text"><br><br>

<label>Phone Number</label><br>
<input type="tel"><br><br>

<label>Vehicle</label><br>
<input type="text" placeholder="Example: 2022 Ford F-150"><br><br>

<label>Select Service</label><br>
<select>
    <option>Interior Detail</option>
    <option>Exterior Detail</option>
    <option>Full Detail</option>
</select><br><br>

<button type="submit">Continue</button>

</form>

</section>
<footer>
    <p>© 2026 ADetailing</p>
</footer>
</body>
</html>
