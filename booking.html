<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Now | ADetailing</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Book Your Detail</h1>
    <p>Reserve your appointment with ADetailing</p>
</header>

<section>

<h2>Request an Appointment</h2>

<form action="https://formspree.io/f/mojganbl" method="POST">

<label>Full Name</label>
<br>
<input type="text" name="name" placeholder="Full Name">
<br><br>

<label>Phone Number</label>
<br>
<input type="tel" name="phone" placeholder="Phone Number">
<br><br>

<label>Vehicle</label>
<br>
<input type="text" name="vehicle" placeholder="Example: 2022 Ford F-150">
<br><br>

<label>Choose Available Date</label>
<br>
<select name="date">
    <option>Friday, July 17</option>
    <option>Saturday, July 18</option>
    <option>Monday, July 20</option>
</select>
<br><br>
    
<label>Select Service</label>
<br>
<select name="service">
    <option>Interior Detail</option>
    <option>Exterior Detail</option>
    <option>Full Detail</option>
</select>
<br><br>
    
<label>Additional Details</label><br>
<textarea name="message" placeholder="Anything we should know about your vehicle?"></textarea><br><br>

<button class="button" type="submit">Send Booking Request</button>

</form>

</section>
<footer>
    <p>© 2026 ADetailing</p>
</footer>
</body>
</html>
